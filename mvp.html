<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Idle MVP</title>
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #1a1a2e;
            --bg-hover: #2a2a3e;
            --text-primary: #fff;
        }
        
        /* 基础样式类 */
        .font-arial { font-family: Arial, sans-serif; }
        .margin-0 { margin: 0; }
        .padding-20 { padding: 20px; }
        .padding-10 { padding: 10px; }
        .text-center { text-align: center; }
        .cursor-pointer { cursor: pointer; }
        .overflow-y-auto { overflow-y: auto; }
        .border-radius-5 { border-radius: 5px; }
        
        /* 颜色类 */
        .bg-primary { background-color: var(--bg-primary); }
        .bg-secondary { background-color: var(--bg-secondary); }
        .bg-hover:hover { background-color: var(--bg-hover); }
        .text-primary { color: var(--text-primary); }
        
        /* 布局类 */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .justify-around { justify-content: space-around; }
        .grid { display: grid; }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .gap-10 { gap: 10px; }
        .max-w-800 { max-width: 800px; }
        .mx-auto { margin: 0 auto; }
        .h-100 { height: 100px; }
        
        /* 间距类 */
        .mb-20 { margin-bottom: 20px; }
    </style>
</head>
<body class="font-arial margin-0 padding-20 bg-primary text-primary">
    <div id="game-container" class="flex flex-col max-w-800 mx-auto">
        <h1>Cosmic Idle MVP</h1>
        
        <div id="resources" class="flex justify-around bg-secondary padding-10 border-radius-5 mb-20">
            <div class="resource text-center" id="energy">Energy: 10</div>
            <div class="resource text-center" id="metal">Metal: 5</div>
            <div class="resource text-center" id="crystal">Crystal: 0</div>
        </div>
        
        <div id="buildings" class="grid grid-cols-2 gap-10 mb-20">
            <div class="building bg-secondary padding-10 border-radius-5 cursor-pointer bg-hover" onclick="buyBuilding('solarPanel')">
                <h3>Solar Panel</h3>
                <p>Cost: 10 Metal</p>
                <p>Produces: 0.1 Energy/s</p>
                <p>Owned: <span id="solarPanelCount">0</span></p>
            </div>
            <div class="building bg-secondary padding-10 border-radius-5 cursor-pointer bg-hover" onclick="buyBuilding('mine')">
                <h3>Mine</h3>
                <p>Cost: 20 Energy</p>
                <p>Produces: 0.05 Metal/s</p>
                <p>Owned: <span id="mineCount">0</span></p>
            </div>
        </div>
        
        <div id="log" class="h-100 overflow-y-auto bg-secondary padding-10 border-radius-5">
            <p>Welcome to Cosmic Idle! Start by building Solar Panels to generate Energy.</p>
        </div>
    </div>

    <script>
        // Game state
        const gameState = {
            resources: {
                energy: 20,
                metal: 20,
                crystal: 0
            },
            buildings: {
                solarPanel: {
                    count: 0,
                    cost: { metal: 10 },
                    production: { energy: 0.1 }
                },
                mine: {
                    count: 0,
                    cost: { energy: 20 },
                    production: { metal: 0.05 }
                }
            },
            lastUpdate: Date.now()
        };

        // Save game state to localStorage
        function saveGame() {
            const saveData = {
                resources: gameState.resources,
                buildings: gameState.buildings,
                lastUpdate: gameState.lastUpdate
            };
            localStorage.setItem('cosmicIdle_save', JSON.stringify(saveData));
        }

        // Load game state from localStorage
        function loadGame() {
            const savedData = localStorage.getItem('cosmicIdle_save');
            if (savedData) {
                const parsedData = JSON.parse(savedData);
                
                // Calculate offline time in seconds
                const currentTime = Date.now();
                const offlineTime = (currentTime - parsedData.lastUpdate) / 1000;
                
                // Calculate offline production
                let offlineEnergy = parsedData.buildings.solarPanel.count * parsedData.buildings.solarPanel.production.energy * offlineTime;
                let offlineMetal = parsedData.buildings.mine.count * parsedData.buildings.mine.production.metal * offlineTime;
                
                // Update game state with loaded data
                gameState.resources = { ...parsedData.resources };
                gameState.buildings = { ...parsedData.buildings };
                gameState.lastUpdate = currentTime;
                
                // Add offline production to resources
                gameState.resources.energy += offlineEnergy;
                gameState.resources.metal += offlineMetal;
                
                // Show offline earnings message
                if (offlineTime > 60) { // Only show if offline for more than 1 minute
                    const minutesOffline = Math.floor(offlineTime / 60);
                    const hoursOffline = Math.floor(minutesOffline / 60);
                    
                    let timeMessage = '';
                    if (hoursOffline > 0) {
                        timeMessage = `${hoursOffline}小时${minutesOffline % 60}分钟`;
                    } else {
                        timeMessage = `${minutesOffline}分钟`;
                    }
                    
                    logMessage(`欢迎回来！您离线了${timeMessage}，获得了：`);
                    if (offlineEnergy > 0) {
                        logMessage(`+${Math.floor(offlineEnergy)} 能量`);
                    }
                    if (offlineMetal > 0) {
                        logMessage(`+${Math.floor(offlineMetal)} 金属`);
                    }
                }
                
                return true;
            }
            return false;
        }

        // Auto-save every 30 seconds
        function startAutoSave() {
            setInterval(() => {
                saveGame();
            }, 30000);
        }

        // Main game loop
        function gameLoop() {
            const now = Date.now();
            const deltaTime = (now - gameState.lastUpdate) / 1000; // Convert to seconds
            gameState.lastUpdate = now;

            // Update resource production
            gameState.resources.energy += gameState.buildings.solarPanel.count * gameState.buildings.solarPanel.production.energy * deltaTime;
            gameState.resources.metal += gameState.buildings.mine.count * gameState.buildings.mine.production.metal * deltaTime;

            // Update UI
            updateUI();

            requestAnimationFrame(gameLoop);
        }

        // Update UI elements
        function updateUI() {
            document.getElementById('energy').textContent = `Energy: ${Math.floor(gameState.resources.energy)}`;
            document.getElementById('metal').textContent = `Metal: ${Math.floor(gameState.resources.metal)}`;
            document.getElementById('crystal').textContent = `Crystal: ${Math.floor(gameState.resources.crystal)}`;
            document.getElementById('solarPanelCount').textContent = gameState.buildings.solarPanel.count;
            document.getElementById('mineCount').textContent = gameState.buildings.mine.count;
        }

        // Buy a building
        function buyBuilding(buildingType) {
            const building = gameState.buildings[buildingType];
            let canAfford = true;

            // Check if player can afford the building
            for (const [resource, cost] of Object.entries(building.cost)) {
                if (gameState.resources[resource] < cost) {
                    canAfford = false;
                    logMessage(`Not enough ${resource} to build ${buildingType}`);
                    break;
                }
            }

            if (canAfford) {
                // Deduct resources
                for (const [resource, cost] of Object.entries(building.cost)) {
                    gameState.resources[resource] -= cost;
                }

                // Add building
                building.count++;
                logMessage(`Built a new ${buildingType}!`);
                updateUI();
                saveGame(); // Save after building purchase
            }
        }

        // Add message to log
        function logMessage(message) {
            const log = document.getElementById('log');
            const entry = document.createElement('p');
            entry.textContent = message;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // Start the game
        window.onload = function() {
            if (!loadGame()) {
                // No saved game, start fresh
                logMessage("Welcome to Cosmic Idle! Start by building Solar Panels to generate Energy.");
            }
            updateUI();
            startAutoSave();
            gameLoop();
        };

        // Save game when page is about to close
        window.addEventListener('beforeunload', saveGame);
    </script>
</body>
</html>
